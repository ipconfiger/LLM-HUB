name: Release npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    env:
      CARGO_TARGET_DIR: target
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
            asset: llm-hub-darwin-arm64
          - runner: macos-14
            target: x86_64-apple-darwin
            asset: llm-hub-darwin-x64
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            asset: llm-hub-linux-x64
            use_cross: true
          - runner: ubuntu-22.04
            target: aarch64-unknown-linux-musl
            asset: llm-hub-linux-arm64
            use_cross: true
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            asset: llm-hub-linux-x64-gnu
            use_cross: true
          - runner: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            asset: llm-hub-linux-arm64-gnu
            use_cross: true
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            asset: llm-hub-win32-x64.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (cross-compile)
        if: matrix.use_cross
        run: cargo install --locked cross

      - name: Build binary
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Strip binary (unix only)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/llm-hub"
          [ -f "${BIN}.exe" ] && BIN="${BIN}.exe"
          strip "${BIN}" || true

      - name: Stage binary for upload
        shell: bash
        run: |
          SRC="target/${{ matrix.target }}/release/llm-hub"
          [ -f "${SRC}.exe" ] && SRC="${SRC}.exe"
          cp "${SRC}" "${{ matrix.asset }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          retention-days: 7

  release:
    name: Release + Publish
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: assets
          merge-multiple: true

      - name: Make unix binaries executable
        run: chmod +x assets/llm-hub-* || true

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: assets/llm-hub-*

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install latest npm
        run: npm install -g npm@latest

      - name: Set package version from tag
        working-directory: dist/npm/llm-hub
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version --no-git-tag-version "$VERSION"

      - name: Publish to npm (OIDC trusted publishing)
        working-directory: dist/npm/llm-hub
        run: npm publish --access public --provenance
        continue-on-error: true
        # First release requires the trusted publisher to be configured on npm.
        # The GitHub Release + binaries are already created above, so installs
        # work even if this publish is pending OIDC setup.
